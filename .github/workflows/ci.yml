name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Secret scanning ──────────────────────────────────────────────────────────
  # Runs first and fastest. Gitleaks scans every commit in the PR for leaked
  # credentials so we catch secrets before they ever reach main, even if the
  # dev forgets to run /commit locally.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can diff every commit in the PR

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Frontend quality checks ───────────────────────────────────────────────────
  frontend:
    name: Frontend — lint · typecheck · audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        # --noEmit: type-checks without writing output files.
        # Catches type errors that ESLint misses (e.g. wrong Prisma field names).
        run: npx tsc --noEmit

      - name: Dependency vulnerability audit
        # `npm audit --audit-level=high` fails the job only on high/critical CVEs.
        # Low/moderate are noisy and rarely exploitable in a Next.js app context.
        run: npm audit --audit-level=high

  # ── Backend quality checks ────────────────────────────────────────────────────
  backend:
    name: Backend — lint · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        # Ruff is a fast Python linter (written in Rust). It replaces flake8 +
        # isort in one tool. Install it as a dev dependency if not already listed.
        run: pip install ruff && ruff check .

      - name: Pyright type-check
        # Pyright is Pydantic-aware and catches FastAPI type errors that mypy misses.
        run: pip install pyright && pyright .